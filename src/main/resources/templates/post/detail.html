<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
</head>
<body>
<h1 th:text="${post.title}"></h1>
<p>
    작성자: <span th:text="${post.author}"></span> |
    조회수: <span th:text="${post.cnt}"></span> |
    작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
</p>
<hr>
<div th:text="${post.content}"></div>
<hr>

<a th:href="@{/posts/{id}/edit(id=${post.id})}">수정</a>
<form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
</form>
<a href="/posts">목록으로</a>

</body>
</html>
