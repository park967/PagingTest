<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
</head>
<body>
<h1 th:text="${post.title}"></h1>
<p>
    작성자: <span th:text="${post.author}"></span> |
    조회수: <span th:text="${post.viewCount}"></span> |
    작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
</p>
<hr>
<div th:text="${post.content}"></div>
<hr>

<a th:href="@{/posts/{id}/edit(id=${post.id})}">수정</a>
<form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
</form>
<a href="/posts">목록으로</a>

<hr>
<h3>댓글 (<span th:text="${#lists.size(post.comments)}"></span>)</h3>

<ul>
    <li th:each="comment : ${post.comments}">
        <strong th:text="${comment.author}"></strong>:
        <span th:text="${comment.content}"></span>
        <small th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
        <form th:action="@{/posts/{postId}/comments/{commentId}/delete(postId=${post.id}, commentId=${comment.id})}"
              method="post" style="display:inline;">
            <button type="submit">삭제</button>
        </form>
    </li>
</ul>

<h4>댓글 작성</h4>
<form th:action="@{/posts/{postId}/comments(postId=${post.id})}" method="post">
    <input type="hidden" name="postId" th:value="${post.id}">
    작성자: <input type="text" name="author" required><br>
    내용: <textarea name="content" required></textarea><br>
    <button type="submit">댓글 등록</button>
</form>
</body>
</html>
