<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성/수정</title>
</head>
<body>
<h1 th:text="${post.id!= 0} ? '게시글 수정' : '게시글 작성'"></h1>

<!-- 수정: POST /posts/{id}/edit, 작성: POST /posts -->
<form th:action="${post.id!= 0} ? @{/posts/{id}/edit(id=${post.id})} : @{/posts}" method="post">

    <div th:if="${post.id == 0}">
        작성자: <input type="text" name="author" required><br>
    </div>

    제목: <input type="text" name="title" th:value="${post?.title}" required><br>
    내용: <textarea name="content" required th:text="${post?.content}"></textarea><br>

    <button type="submit" th:text="${post.id!= 0} ? '수정' : '등록'"></button>
    <a th:href="${post.id!= 0}? @{/posts/{id}(id=${post.id})} : @{/posts}">취소</a>
</form>
</body>
</html>
